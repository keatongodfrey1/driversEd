<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Wrong Way sign">
  <rect x="10" y="28" width="80" height="44" rx="4" fill="#c1121f" stroke="#fff" stroke-width="4"/>
  <text x="50" y="43" fill="#fff" font-family="Arial, sans-serif" font-size="15"
        font-weight="bold" text-anchor="middle" dominant-baseline="central">WRONG</text>
  <text x="50" y="60" fill="#fff" font-family="Arial, sans-serif" font-size="15"
        font-weight="bold" text-anchor="middle" dominant-baseline="central">WAY</text>
</svg>
